name: deploy por ambiente

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      ambiente:
        description: 'qual ambiente? (dev / test / prod)'
        required: true
        default: 'dev'

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - run: mvn clean package -DskipTests
      - name: deploy dev
        run: echo "Subindo para dev..."
      - name: resumo
        run: |
          echo "## Deploy DEV" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  deploy-test:
    runs-on: ubuntu-latest
    environment: test
    needs: deploy-dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - run: mvn clean package -DskipTests
      - name: deploy test
        run: echo "Subindo para test..."
      - name: resumo
        if: always()
        run: |
          echo "## Deploy TEST" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  deploy-prod:
    runs-on: ubuntu-latest
    environment: prod
    needs: deploy-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - run: mvn clean package -DskipTests
      - name: autenticar na aws
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: deploy prod
        run: echo "Subindo para producao..."
        env:
          DB_URL: ${{ secrets.PROD_DB_URL }}
          DB_USER: ${{ secrets.PROD_DB_USER }}
          DB_PASS: ${{ secrets.PROD_DB_PASS }}
      - name: resumo
        if: always()
        run: |
          echo "## Deploy PROD" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
